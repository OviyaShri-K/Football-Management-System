<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Statistics</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="dashboard-container">

    <!-- ======================
            SIDEBAR
    ======================= -->

    <aside class="sidebar">

        <div class="logo-section">

            <img src="assets/logo.png" alt="Logo">

        </div>

        <ul class="menu">

            <li>

                <a href="dashboard.html">

                    <i class="fas fa-house"></i>

                    <span>Dashboard</span>

                </a>

            </li>

            <li>

                <a href="team.html">

                    <i class="fas fa-users"></i>

                    <span>Team</span>

                </a>

            </li>

            <li>

                <a href="schedule.html">

                    <i class="fas fa-calendar-days"></i>

                    <span>Schedule</span>

                </a>

            </li>

            <li>

                <a href="matches.html">

                    <i class="fas fa-futbol"></i>

                    <span>Matches</span>

                </a>

            </li>

            <li class="active">

                <a href="statistics.html">

                    <i class="fas fa-chart-line"></i>

                    <span>Statistics</span>

                </a>

            </li>

            <li>

                <a href="notifications.html">

                    <i class="fas fa-bell"></i>

                    <span>Notifications</span>

                </a>

            </li>

            <li>

                <a href="settings.html">

                    <i class="fas fa-gear"></i>

                    <span>Settings</span>

                </a>

            </li>

        </ul>

    </aside>

    <!-- ======================
            MAIN CONTENT
    ======================= -->

    <main class="statistics-content">

        <h1>Statistical Overview</h1>

        <!-- ======================
                TOP CARDS
        ======================= -->

        <div class="statistics-cards">

            <div class="statistics-card">

                <h2>12</h2>

                <p>Matches Played</p>

            </div>

            <div class="statistics-card">

                <h2>7</h2>

                <p>Wins</p>

            </div>

            <div class="statistics-card">

                <h2>3</h2>

                <p>Draws</p>

            </div>

            <div class="statistics-card">

                <h2>2</h2>

                <p>Losses</p>

            </div>

        </div>

        <!-- ======================
                CHART SECTION
        ======================= -->

        <div class="statistics-chart-section">
                        <!-- =========================
                    GOALS SCORED
            ========================== -->

            <div class="statistics-chart-card">

                <h2>Goals Scored</h2>

                <img src="assets/bar-chart.png"
                     alt="Goals Scored Chart">

            </div>

            <!-- =========================
                    WIN PERCENTAGE
            ========================== -->

            <div class="statistics-chart-card">

                <h2>Win Percentage</h2>

                <img src="assets/pie-chart.png"
                     alt="Win Percentage">

            </div>

        </div>

        

            
            

            

        </div>
            </main>

</div>

</body>

</html>
